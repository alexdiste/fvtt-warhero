<div class="warhero-chat-card">
  <div class="warhero-chat-message-header">
    <h4 class="chat-actor-name">{{localize "WH.ui.result"}}</h4>
  </div>

  <div class="warhero-chat-message-body">
    <ul>
      {{#if alias}}
      <li><strong>{{localize "WH.ui.actor"}}:</strong> {{alias}}</li>
      {{/if}}
      {{#if sumSuccess}}
      <li><strong>{{localize "WH.ui.success"}}:</strong> {{sumSuccess}}</li>
      {{/if}}
      {{#if successDetails.result}}
      <li><strong>{{localize "WH.ui.effect"}}:</strong> {{successDetails.result}}</li>
      {{/if}}
    </ul>
  </div>
</div>
