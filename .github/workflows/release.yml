name: Release System (Strict Stable Logic)

on:
  push:
    tags:
      - 'v*' # Trigger per Prerelease / Beta
      - 's*' # Trigger per Release STABILE

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine Release Type
        id: vars
        run: |
          RAW_TAG=${GITHUB_REF#refs/tags/}
          # Estraiamo solo il numero di versione togliendo la prima lettera (v o s)
          VERSION_NUMBER=${RAW_TAG#?}

          echo "version_to_write=$VERSION_NUMBER" >> $GITHUB_OUTPUT

          if [[ "$RAW_TAG" == s* ]]; then
            # --- LOGICA STABILE (Solo se il tag inizia con 's') ---
            echo "is_beta=false" >> $GITHUB_OUTPUT
            echo "zip_name=fvtt-warhero.zip" >> $GITHUB_OUTPUT
            echo "manifest_url=https://github.com/alexdiste/fvtt-warhero/releases/latest/download/system.json" >> $GITHUB_OUTPUT
            echo "download_url=https://github.com/alexdiste/fvtt-warhero/releases/latest/download/fvtt-warhero.zip" >> $GITHUB_OUTPUT
            echo "TIPO: STABILE"
          else
            # --- LOGICA PRERELEASE (Per tag 'v' o qualsiasi altro) ---
            echo "is_beta=true" >> $GITHUB_OUTPUT
            echo "zip_name=fvtt-warhero-$VERSION_NUMBER.zip" >> $GITHUB_OUTPUT
            echo "manifest_url=https://github.com/alexdiste/fvtt-warhero/releases/download/$RAW_TAG/system.json" >> $GITHUB_OUTPUT
            echo "download_url=https://github.com/alexdiste/fvtt-warhero/releases/download/$RAW_TAG/fvtt-warhero-$VERSION_NUMBER.zip" >> $GITHUB_OUTPUT
            echo "TIPO: PRERELEASE"
          fi

      - name: Update system.json with sed
        run: |
          # Aggiorna versione, manifest e download nel file system.json
          sed -i 's/"version":\s*".*"/"version": "${{ steps.vars.outputs.version_to_write }}"/' system.json
          sed -i 's|"manifest":\s*".*"|"manifest": "${{ steps.vars.outputs.manifest_url }}"|' system.json
          sed -i 's|"download":\s*".*"|"download": "${{ steps.vars.outputs.download_url }}"|' system.json

      - name: Create Clean Zip
        run: |
          # Esclude file sorgente, documentazione e file di sistema/nascosti
          zip -r ${{ steps.vars.outputs.zip_name }} . \
          -x ".*" "*/.*" "scripts/*" "src/*" "packs/_source/*" \
          -x "package.json" "fvtt-warhero*.zip" "docs/*" "changelog.md" \
          -x ".github/*" ".git/*"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          prerelease: ${{ steps.vars.outputs.is_beta }}
          files: |
            system.json
            ${{ steps.vars.outputs.zip_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
