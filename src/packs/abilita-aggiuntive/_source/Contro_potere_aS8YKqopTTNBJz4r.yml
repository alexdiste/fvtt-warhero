  description: >-
    <p><strong>Prerequisito:</strong> Capacità di lanciare poteri</p>

    <p><strong>Benefici:</strong> Una volta al giorno, se un avversario lancia
    un potere, si può tentare di neutralizzarlo. Entrambi i personaggi devono
    lanciare 1d20, a cui si aggiungono i rispettivi valori di MEN ed eventuali
    bonus. Se il punteggio ottenuto dal giocatore che ha lanciato il
    contropotere è più alto, il potere viene neutralizzato. Il giocatore che ha
    lanciato il contropotere, inoltre, non potrà utilizzare mosse potere nel suo
    prossimo round.Non è possibile selezionare questa abilità con l’abilità
    aggiuntiva “Capacità extra”</p>
