    notes: >-
      <p>Un famiglio fornisce un Bonus di +1 a una delle statistiche FIS, IST o
      MEN in maniera permanente a scelta del giocatore, &egrave; possibile una
      volta al giorno cambiare il proprio famiglio e cambiare anche la
      statistica che ottiene ilbonus, proprio come si farebbe con un compagno
      animale,l'animale in questione non deve per&ograve; fare nessun tiro su
      MENse non &egrave; un famiglio intelligente come pu&ograve; essere un
      piccolodraghetto, in quel caso &egrave; necessario che la creatura
      fallisca untiro su MEN, CD 15 per diventare il famiglio. Il famiglio
      &egrave;sempre con il padrone e per ucciderlo deve essere preso dimira
      volontariamente, cio&egrave; non subisce gli effetti di poteri adarea. Le
      statistiche del famiglio sono fornite dal master, al proprio famiglio ad
      ogni turno &egrave; possibile dare uno deiseguenti comandi come mossa di
      azione.● Muovi: si muove della sua velocit&agrave;.● Fermo: Il famiglio
      sta fermo nel luogo indicato</p>

      <p>Di norma l'animale deve essere entro 30 metri dal padroneper ricevere
      ordini, In casi normali il famiglio deve poter stare addosso al padrone.
      Il famiglio ha punti ferita pari a 5+(FIS*5 se positivo), e Difesa 14 +
      IST</p>

      <p>Un famiglio non viene mai contato ma si considera insieme alsuo padrone
      per quanto riguarda il Teletrasporto della sfera di Viaggio</p>
    gmnotes: ''
