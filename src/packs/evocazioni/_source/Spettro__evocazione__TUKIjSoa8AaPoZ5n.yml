    notes: >-
      <p>Le creature evocate scompaiono quando muoiono o all'alba del giorno
      seguente e non &egrave; possibile evocare pi&ugrave; di una creatura alla
      volta. E&rsquo; necessario usare una mossa per far seguire le 2 mosse alla
      propria evocazione. Usare pi&ugrave; di un colpo con una singola mossa
      attacco si ottiene lo stessomalus come nell&rsquo;uso delle due armi. Le
      evocazioni hanno punti ferita pari a 10 +(10*FIS) e una difesa pari a 12
      +IST, il tempo di lancio di questi poteri &egrave; di 4 mosse consecutive.
      E necessario usareuna mossa per poter far eseguire 2 mosse
      all&rsquo;evocazione</p>
