  - name: Soffio (8d6 fuoco)
    type: skill
    img: systems/fvtt-warhero/images/icons/talenti.webp
    system:
      raceskill: false
      classskill: false
      unlimited: true
      acquiredatlevel: 0
      currentuse: 0
      maxuse: 0
      description: >-
        <p>Una creatura espelle qualcosa dalla sua bocca. La maggior parte delle
        creature con armi da soffio sono limitate ad un numero di utilizzi al
        giorno o da una lunghezza minima di tempo che deve trascorrere tra un
        uso e l' altro. Utilizzare un soffio &egrave; considerata una mossa
        azione, ma non si pu&ograve; fare pi&ugrave; di una volta per turno.
        Nessun tiro per colpire &egrave; necessario. Il soffio riempie l'area
        indicata</p>

        <p>&nbsp;</p>

        <p>il soffio infligge [[/r 8d6 #soffio di drago di fuoco]] danni per
        ogni punto MEN del drago a tutti i bersagli di fronte al drago entro 12
        metri, CD 12+MEN per dimezzare</p>
