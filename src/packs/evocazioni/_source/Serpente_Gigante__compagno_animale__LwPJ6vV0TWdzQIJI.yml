    description: ''
    notes: "<p>Un \_personaggio \_con \_l' abilità compagno animale\_ può tentare \_di \_controllare questo animale\_ e \_usarlo come \_suo \_compagno. \_Non \_può \_avere \_più \_di \_un \_compagno \_per\_<br>volta. \_Per \_riuscire \_ad \_averlo,l'animale \_deve \_fallire \_un \_tiro \_su MEN, \_CD \_15. \_L'animale \_resta \_con \_il \_personaggio \_fino \_a \_quando non \_viene \_congedato, \_muore \_o \_non \_viene \_scelto \_un \_nuovo compagno. \_Le \_statistiche \_del \_compagno \_animale \_sono \_fornite dal \_master, \_al \_proprio \_compagno \_animale \_ad \_ogni \_turno \_con\_<br>una mossa azione è possibile dare uno dei seguenti comandi</p><ul><li><span style=\"font-size: 0.875rem;\">Muovi: \_si \_muove \_della \_sua \_velocità, \_se \_può \_essere \_cavalcato </span>lo fa con chi lo cavalca</li><li>Attacca: Attacca il bersaglio che desidera il padrone</li><li>Fermo: Il compagno sta fermo nel luogo indicato</li></ul><p><br>Di \_normale \_l'animale \_deve \_essere \_entro \_30 \_metri \_dal \_padrone per ricevere ordini. Il \_compagno \_animale \_ha \_punti \_ferita \_pari \_a \_10+(FIS*10 \_se positivo), e Difesa 12 + IST Un \_compagno \_animale \_conta \_come \_una \_persona \_al \_fine \_del @UUID[Compendium.fvtt-warhero.poteri.Item.1UrtrLZ51eLjsEIx]{Viaggio - III Teletrasporto} della sfera di @UUID[Compendium.fvtt-warhero.sfere-di-magia.Item.IHxRgAwl2K6J760H]{31.Viaggio}</p>"
