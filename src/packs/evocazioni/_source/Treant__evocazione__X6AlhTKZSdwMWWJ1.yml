    notes: "<p>Le creature evocate scompaiono quando muoiono o all'alba del giorno seguente e non è possibile evocare più di una creatura alla volta. E’ necessario usare una mossa per far seguire le 2 mosse alla propria evocazione. Usare più di un colpo con una singola mossa attacco si ottiene lo stessomalus come nell’uso delle due armi. Le evocazioni hanno punti ferita pari a 10 +(10*FIS) e una difesa pari a 12 +IST, il tempo di lancio di questi poteri è di 4 mosse consecutive. E necessario usareuna mossa per poter far eseguire 2 mosse all’evocazione.</p><p>\_</p><p>Questi tre treant chepermangono per 5 round si considerano una unica evocazione al fine dei limiti di controllo di creature evocate e si calcolano le statistiche come le creature evocate, ma il tempo di lancio di questo incantesimo è di una mossa incantesimo</p>"
