    notes: >-
      <p>Tutti i golem sono immuni ai poteri, nessun potere &egrave; in
      grado&nbsp;di fargli danno o potenziarlo. I golem possono impugnare
      armi,&nbsp;e sono competenti in tutti i tipi di arma e scudi ma non
      nelle&nbsp;armature. Ogni Golem ha tanti punti ferita pari a 10 +
      (FIS*10)&nbsp;e un valore di classe armatura pari a 15 + IST. Forgiare
      un&nbsp;golem richiede 2 ore ininterrotte di lavoro, se il golem
      viene&nbsp;distrutto o muore il materiale recuperato pu&ograve; fornire
      parte del&nbsp;valore necessario per riforgiarlo, e il costo per
      riforgiarlo con il&nbsp;materiale recuperato diventa il valore descritto
      nel golem fra&nbsp;parentesi quadre. Un golem ha due mosse a disposizione
      e&nbsp;agisce sempre nel round del suo padrone</p>
