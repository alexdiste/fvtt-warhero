  - name: 'Competenza Scudi: Leggeri'
    type: competency
    img: systems/fvtt-warhero/images/icons/parata.webp
    system:
      description: >-
        <p data-pm-slice="1 1 []">Il personaggio &eacute; competente con gli
        scudi leggere. Gli scudi leggeri permettono di fare azione di
        @Compendium[fvtt-warhero.azioni.ZULztptNLupwqB0G]{Parata} con di [[/r
        1d12+1 #parata con scudo leggero + aggiungere eventuali bonus di parata.
        Ricordo si pu&oacute; parare solo un attacco per turno. Se ottieni 1
        &eacute; sempre fallimento automatico, se ottieni 12 sempre successo
        automatico, altrimenti pari se con questo tiro fai 12 o pi&uacute;]].
        Ricordo si pu&oacute; parare solo un attacco per turno e che se si
        ottiene 1 sar&aacute; sempre un fallimento, con 12 di dado invece si
        parer&aacute; sempre, altimenti bisogna superare 12.</p>
    effects: []
