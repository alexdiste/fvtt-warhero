  - name: Urlo di morte
    type: skill
    img: systems/fvtt-warhero/images/icons/spark-spirit.svg
    system:
      raceskill: true
      classskill: false
      unlimited: true
      acquiredatlevel: 0
      currentuse: 0
      description: >-
        <p>una banshee può una volta ogni 10 round fare un urlo di morte e tutte
        le creature intorno a lei nel raggio di 30 metri subiscono un effetto
        uguale all’incantesimo dito di morte di livello
        @Compendium[fvtt-warhero.poteri.KqvWjxWIifyTKNJy]{Morte - III Dito di
        morte}, con la differenza che la CD di tale incantesimo è aumentata di
        +2</p>
      maxuseFormula: '1'
    effects: []
