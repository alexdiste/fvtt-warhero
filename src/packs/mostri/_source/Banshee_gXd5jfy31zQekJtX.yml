  - name: Aura 10d6 (freddo)
    type: skill
    img: systems/fvtt-warhero/images/icons/spark-spirit.svg
    system:
      raceskill: true
      classskill: false
      unlimited: true
      acquiredatlevel: 0
      currentuse: 0
      description: >-
        <p>Chiunque nel raggio di 10 metri deve riuscire in un salvataggio su
        FIS CD 14 o subire Xd6 danni di qualche genere in base alla creatura,
        ogni round che vi si trova all'interno. Una creatura evocata può
        decidere chi l'ha evocata se infliggere il danno o meno a chi entra
        nella sua aura</p>
      maxuseFormula: '1'
