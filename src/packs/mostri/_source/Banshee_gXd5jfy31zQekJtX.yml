  - name: Volare (9 Metri)
    type: skill
    img: systems/fvtt-warhero/images/icons/spark-spirit.svg
    system:
      raceskill: true
      classskill: false
      unlimited: true
      acquiredatlevel: 0
      currentuse: 0
      description: >-
        <p>Una creatura con questa abilità può cessare o riprendere il volo come
        mossa di movimento. Se l’abilità è soprannaturale, diventa inefficace in
        un campo anti potere finché questo rimane attivo. Può terminare il
        movimento in un quadrato già occupato</p>
      maxuseFormula: '1'
