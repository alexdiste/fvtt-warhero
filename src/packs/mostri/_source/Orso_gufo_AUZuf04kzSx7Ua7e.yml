    description: ''
    notes: "<p>Le creature evocate scompaiono quando muoiono o all'alba del giorno seguente e non è possibile evocare più di una creatura alla volta. E’ necessario usare una mossa per far seguire le 2 mosse alla propria evocazione. Usare più di un colpo con una singola mossa attacco si ottiene lo stessomalus come nell’uso delle due armi. Le evocazioni hanno punti ferita pari a 10 +(10*FIS) e una difesa pari a 12 +IST, il tempo di lancio di questi poteri è di 4 mosse consecutive. E necessario usareuna mossa per poter far eseguire 2 mosse all’evocazione.</p><p>\_</p><p>Questi tre treant chepermangono per 5 round si considerano una unica evocazione al fine dei limiti di controllo di creature evocate e si calcolano le statistiche come le creature evocate, ma il tempo di lancio di questo incantesimo è di una mossa incantesimo</p><p><br>Di \_normale \_l'animale \_deve \_essere \_entro \_30 \_metri \_dal \_padrone per ricevere ordini. Il \_compagno \_animale \_ha \_punti \_ferita \_pari \_a \_10+(FIS*10 \_se positivo), e Difesa 12 + IST Un \_compagno \_animale \_conta \_come \_una \_persona \_al \_fine \_del @UUID[Compendium.fvtt-warhero.poteri.Item.1UrtrLZ51eLjsEIx]{Viaggio - III Teletrasporto} della sfera di @UUID[Compendium.fvtt-warhero.sfere-di-magia.Item.IHxRgAwl2K6J760H]{31.Viaggio}</p>"
