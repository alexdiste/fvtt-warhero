    fallimento automatico, se ottieni 12 sempre successo automatico, altrimenti
    pari se con questo tiro fai 12 o pi&uacute;]]. Ricordo si pu&oacute; parare
    solo un attacco per turno e che se si ottiene 1 sar&aacute; sempre un
    fallimento, con 12 di dado invece si parer&aacute; sempre, altimenti bisogna
    superare 12.</p>
