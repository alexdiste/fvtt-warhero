name: 'Competenza armi: In asta'
type: competency
img: systems/fvtt-warhero/images/icons/battle-gear.svg
system:
  description: >-
    <p data-pm-slice="1 1 []">Il personaggio &eacute; competente con le armi in
    asta. Le armi in asta possono essere usate sia ad una mano che a due mani.
    Se usate ad una mano infliggono [[/r 1d6 #+fisico+ bonus ai danni in
    mischia]] +fisico + eventuali bonus per i danni in mischia.</p>

    <p>Se usate invece a due mani infliggono:</p>

    <p>[[/r 1d8 #+1 volta e mezzo il fisico+ bonus ai danni in mischia]] + una
    volta e mezzo il valore di fisico (arrotondato per difetto) + eventuali
    bonus per i danni in mischia.</p>
