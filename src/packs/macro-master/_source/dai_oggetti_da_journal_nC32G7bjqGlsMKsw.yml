name: dai oggetti da journal
type: script
command: |-
  // --- CONFIGURAZIONE ---
  const compendiumId = "fvtt-warhero.manuale";
  const journalId = "g4KBDQAp2l3hDbj3";
  const journalName = "Kit";
  const startingObjects = "Oggetti di partenza";

  // 1. ✅ Controllo token selezionato
  const token = canvas.tokens.controlled[0];
  if (!token) {
    ui.notifications.warn("Seleziona un token prima di eseguire la macro.");
    return;
  }

  // 2. ⚠️ Controllo Actor Link (Novità)
  if (!token.document.actorLink) {
    const procedi = await Dialog.confirm({
      title: "Attenzione: Token non linkato",
      content: `<p style="color: #830000;"><b>Avviso:</b> Il token selezionato (<i>${token.name}</i>) non è collegato permanentemente all'Actor nel database.</p>
                <p>Gli oggetti aggiunti esisteranno solo per questo token sulla mappa. Vuoi procedere comunque?</p>`,
      yes: () => true,
      no: () => false,
      defaultYes: false
    });
    if (!procedi) return;
  }

  const actor = token.actor;

  // 3. ✅ Recupero del Journal dal Compendio
  const pack = game.packs.get(compendiumId);
  const journal = pack ? await pack.getDocument(journalId) : null;

  if (!journal) {
    ui.notifications.error(`Journal "${journalName}" (ID: ${journalId}) non trovato nel compendio.`);
    return;
  }

  // 4. ✅ Costruzione menu selezione pagine
  const pages = journal.pages.map(p => p.name);
  let contentMenu = `
  <form>
    <div class="form-group">
      <label>Scegli il Kit da assegnare:</label>
      <div class="form-fields">
        <select autofocus>
          ${pages.map(name => `<option value="${name}">${name}</option>`).join('')}
        </select>
      </div>
    </div>
  </form>`;

  // 5. ✅ Dialogo di selezione
  new Dialog({
    title: "Assegnazione Kit Equipaggiamento",
    content: contentMenu,
    buttons: {
      ok: {
        label: "Applica Kit",
        callback: async (html) => {
          const selectedName = html[0].querySelector("select").value;
          const selectedPage = journal.pages.getName(selectedName);

          if (!selectedPage) {
            ui.notifications.error(`Pagina "${selectedName}" non trovata.`);
            return;
          }

          const pageContent = selectedPage.text?.content || selectedPage.content || "";

          // Logica Regex
          const regexLink = /(?:UUID\[Compendium\.|Compendium\[)([^\]]+)\]/g;
          let itemsToCreate = [];
          let match;

          while ((match = regexLink.exec(pageContent)) !== null) {
            try {
              const doc = await fromUuid(`Compendium.${match[1]}`);
              if (doc) {
                itemsToCreate.push(doc.toObject());
              }
            } catch (err) {
              console.error(`Errore nel recupero dell'oggetto: ${match[1]}`, err);
            }
          }

          // 6. ✅ Creazione degli oggetti
          if (itemsToCreate.length > 0) {
            await actor.createEmbeddedDocuments("Item", itemsToCreate);
          }

          // 7. ✅ Gestione Monete
          if (selectedName === startingObjects) {
            const monete = actor.items.getName("Moneta di oro");
            if (monete) {
              await monete.update({ "system.quantity": 500 });
            }
          }

          ChatMessage.create({
            user: game.user.id,
            content: `Il kit <b>"${selectedName}"</b> è stato assegnato a <b>${actor.name}</b>.`
          });

          ui.notifications.info(`Kit "${selectedName}" applicato.`);
        }
      },
      cancel: { label: "Annulla" }
    },
    default: "ok"
  }).render(true);
