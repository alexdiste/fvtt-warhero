name: dai oggetti da journal
type: script
command: "const journalName = \"Kit\";\nconst journal = game.journal.getName(journalName);\nlet startingObjects=\"Oggetti di partenza\";\n\n// ✅ Controllo esistenza journal\nif (!journal) {\n  ui.notifications.error(`Journal \"${journalName}\" non trovato.`);\n  return;\n}\n\n// ✅ Controllo token selezionato\nconst token = canvas.tokens.controlled[0];\nif (!token) {\n  ui.notifications.warn(\"Seleziona un token prima di eseguire la macro.\");\n  return;\n}\nconst actor = token.actor;\n\n// ✅ Costruzione menu con nomi delle pagine\nconst pages = journal.pages.map(p => p.name);\nlet content = `<form><div class=\"form-group\"><label>Kit di oggetti da assegnare:</label><div class=\"form-fields\"><select autofocus>`;\n//content += `<option value=\"\">Annulla operazione</option>`;\nfor (let name of pages) {\n  content += `<option value=\"${name}\">${name}</option>`;\n}\ncontent += `</select></div></div></form>`;\n\n// ✅ Dialogo con selezione pagina\nnew Dialog({\n  title: \"Seleziona Kit\",\n  content,\n  buttons: {\n    ok: {\n      label: \"Applica\",\n      callback: async (html) => {\n        const selectedName = html[0].querySelector(\"select\").value;\n        if (!selectedName) {\n          ui.notifications.info(\"Operazione annullata.\");\n          return;\n        }\n\n        const selectedPage = journal.pages.getName(selectedName);\n        if (!selectedPage) {\n          ui.notifications.error(`Pagina \"${selectedName}\" non trovata.`);\n          return;\n        }\n\n\t\tlet content = selectedPage.text.content;\n\t\t//console.log(\"contenuto testuale della pagina \"+kit+\" del compendio \"+journalName+\":\\n\" +content);\n\t\t//trasformazioni content copiate da macro equipaggiamento_iniziale\n\t\tcontent=content.replaceAll(/&nbsp;/g, '');\n\t\tcontent=content.replaceAll(\"<p>\", \"\\n\");\n\t\tcontent=content.replaceAll(\"</p>\", \"\");\n\t\tcontent=content.replaceAll(\"@\", \"\\n\");\n\t\t//console.log(content);\n\t\tmyArray=trasformainarray(content);\n\t\t//console.log(\"Elementi nell array: \"+countNumberOfLines(content)+\"\\nArray: \" + myArray);\n\n\t\tfor (j=0;j<myArray.length;j++){\n\t\t//console.log(\"==Kit=\"+kit+\"\\nitem=\"+it.name+\"\\nid=\"+id);\n\t\tflag=0; //tutto ok\n\t\t//console.log(\"sono nel ciclo interno. j è=\"+j+\" valore=\"+myArray[j]);\n\t\tconst stringa1 = myArray[j];\n\t\t//console.log(\"stringa1=\"+stringa1);\n\t\tpos=stringa1.search(\"UUID\");\n\t\tpos2=stringa1.search(\"Compendium\\\\[\");\n\t\t//console.log(\"pos= \"+pos+\" pos2= \"+pos2);\n\n\t\tif (pos>=0){\n\t\t//console.log(\"caso 1. UUID\");\n\t\tcontentcorretto=stringa1.replace(\"UUID[Compendium.\",\"\")\n\t\t}else if (pos2>=0){\n\t\t//console.log(\"caso 2. Quick insert\");\n\t\tcontentcorretto=stringa1.replace(\"Compendium[\",\"\")\n\t\t}else{\n\t\t//console.log(\"caso 3. vuoto o content normale\");\n\t\tflag=-1; //non procedere\n\t\t}\n\n\t\tif (flag==0){\n\t\tposfine=findPositionOfCharacter(contentcorretto,\"]\")\n\t\tcontentcorrettoridotto=contentcorretto.slice(0,posfine);\n\t\t//console.log(contentcorrettoridotto);\n\t\t//split per \".\"\n\t\tmyArray2=contentcorrettoridotto.split(\".\");\n\t\tnomecompendio=myArray2[0]+\".\"+myArray2[1];\n\t\tif (pos>=0){\n\t\tiditem=myArray2[3];\n\t\t}else{\n\t\tiditem=myArray2[2];\n\t\t}\n\t\t//console.log (\"compendio= \"+nomecompendio+\"\\nitem= \"+iditem)\n\t\tmyPacks=await game.packs.get(nomecompendio);\n\t\t//console.log(myPacks);\n\n\t\tconst item= await myPacks.getDocument(iditem);\n\t\t//console.log(item);\n\n\t\tconst itemData = game.items.fromCompendium(item);\n\t\t//console.log(itemData);\n\t\tawait Item.implementation.create(itemData, {parent: actor});\n\t\t}\n\t\t}\n\t\tif(selectedName==startingObjects){\n\t\t//if (confirm(\"Stai dando gli oggetti iniziali, vuoi anche che le monete iniziali siamo impostate a 500?\")){\n\t\t//console.log(\"----------Oggetti iniziali-------\");\n\t\t//Trova oggetto monete di oro e cambia la quantità a 500\n\t\tconst monete= actor.items.getName(\"Moneta di oro\");\n\t\tif (typeof monete !== \"undefined\" || monete !== null){\n\t\t//console.log(\"imposto le monete a 500\");\n\t\tawait monete.update({\"system.quantity\":500}); //aggiorna la quantità di monete a 500\n\t\t}\n\t\t//}    \n\t\t}\n\t\tChatMessage.create({\n\t\tuser : game.user._id,\n\t\tcontent:\"Gli oggetti della  pagina \\\"\"+selectedName+\" \\\"del journal \\\"\"+journalName+\"\\\" sono stati dati al pg \"+token.actor.name\n\t\t})    \n      }\n    },\n    cancel: {\n      label: \"Annulla\"\n    }\n  },\n  default: \"ok\"\n}).render(true);\n\nfunction countNumberOfLines(str) {\n  return str.split(/\\r\\n|\\r|\\n/).length;\n}\n\nfunction trasformainarray(str){\n  return str.split(/\\n/);\n}\n\nfunction findPositionOfCharacter(str, char) {\n  return str.indexOf(char);\n}"
