name: sblocca compendi
type: script
author: guOwSDi78TuzUGFU
img: systems/fvtt-warhero/images/icons/toolbox.svg
scope: global
command: |-
  // Recupera tutti i compendi presenti nel gioco
  const packs = game.packs;

  // Contatore per tenere traccia di quanti compendi vengono sbloccati
  let unlockedCount = 0;

  for (let pack of packs) {
    // Controlla se il compendio è attualmente bloccato e se non è un compendio di "sistema" nativo non modificabile
    if (pack.locked) {
      // Rilascia il blocco configurando la proprietà 'locked' a false
      await pack.configure({ locked: false });
      unlockedCount++;
      console.log(`Sbloccato il compendio: ${pack.collection}`);
    }
  }

  // Mostra una notifica a schermo con il risultato
  if (unlockedCount > 0) {
    ui.notifications.info(`Operazione completata! Sono stati sbloccati ${unlockedCount} compendi.`);
  } else {
    ui.notifications.info("Tutti i compendi erano già sbloccati.");
  }
