name: Copia oggetti da scheda a item collection
type: script
command: >-
  const uuid = "Actor.dBMyAq4pZodFcjgb.Item.qdkj8rCGJIndYHJX"; // ← Il tuo UUID


  // Recupera l'oggetto dall'UUID

  const item = await fromUuid(uuid);

  if (!item) {
      return ui.notifications.error(`Oggetto con UUID "${uuid}" non trovato.`);
  }


  // Clona i dati dell'oggetto in modo sicuro per la V14

  const itemData = foundry.utils.deepClone(item.toObject());


  // Crea l'oggetto nella directory del mondo

  await Item.create(itemData);


  ui.notifications.info(`Oggetto "${item.name}" copiato con successo nella
  directory del mondo.`);
