name: reset stats
type: script
command: "//Macro per resettare FIS,IST e MEN per poter ripartire con il personaggiomante\nif (!token){\n\tChatMessage.create({\n\tuser : game.user._id,\n\tcontent:\"Devi selezionare un token\"\n\t});\n\treturn;\n}else{\n\tawait token.actor.update({\"system.statistics.str.value\": 0}); //resetta FISico\n\tawait token.actor.update({\"system.statistics.dex.value\": 0}); //resetta ISTinto\n\tawait token.actor.update({\"system.statistics.min.value\": 0});//resetta MENte\n\tChatMessage.create({\n\tuser : game.user._id,\n\tcontent:\"Statistiche resettate\"\n\t});\n}"
