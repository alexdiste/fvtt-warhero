name: Copia oggetti da scheda a item collection
type: script
command: >-
  const uuid = "Actor.JdGSLjPUcH1dPpwz.Item.i28PWHeKrGQCZeFg"; // ← Inserisci
  qui il tuo UUID


  // Recupera l'oggetto dall'UUID

  const item = await fromUuid(uuid);

  if (!item) return ui.notifications.error(`Oggetto con UUID "${uuid}" non
  trovato.`);


  // Duplica e crea l'oggetto nella directory Items del mondo

  const itemData = duplicate(item.toObject());

  await Item.create(itemData);

  ui.notifications.info(`Oggetto "${item.name}" copiato nella directory Items
  del mondo.`);
