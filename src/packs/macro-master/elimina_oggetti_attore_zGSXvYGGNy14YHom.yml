command: "if (!token){\n\tChatMessage.create({\n\tuser : game.user._id,\n\tcontent:\"Devi selezionare un token\"\n\t});\n\treturn;\n}else{\n\tcontent=`<form>\n\t<div id=\"checkboxes\">\n\t<label for=\"all\">Tutto</label><input type=\"checkbox\" id=\"all\" name=\"Elemento\" value=\"all\"><br>\n\t<label for=\"equipment\">Equipaggiamento</label><input type=\"checkbox\" id=\"equipment\" name=\"Elemento\" value=\"equipment\" ><br>\n\t<label for=\"race\">Razza</label><input type=\"checkbox\" id=\"race\" name=\"Elemento\" value=\"race\" ><br>\n\t<label for=\"weapon\">Armi</label><input type=\"checkbox\" id=\"weapon\" name=\"Elemento\" value=\"weapon\" ><br>\n\t<label for=\"armor\">Armature</label><input type=\"checkbox\" id=\"armor\" name=\"Elemento\" value=\"armor\" ><br>\n\t<label for=\"shield\">Scudi</label><input type=\"checkbox\" id=\"shield\" name=\"Elemento\" value=\"shield\" ><br>\n\t<label for=\"skill\">Abilità</label><input type=\"checkbox\" id=\"skill\" name=\"Elemento\" value=\"skill\" ><br>\n\t<label for=\"power\">Poteri</label><input type=\"checkbox\" id=\"power\" name=\"Elemento\" value=\"power\" ><br>\n\t<label for=\"language\">Lingue</label><input type=\"checkbox\" id=\"language\" name=\"Elemento\" value=\"language\" ><br>\n\t<label for=\"condition\">Condizioni</label><input type=\"checkbox\" id=\"condition\" name=\"Elemento\" value=\"condition\" ><br>\n\t<label for=\"class\">Classi primarie</label><input type=\"checkbox\" id=\"class\" name=\"Elemento\" value=\"class\" ><br>\n\t<label for=\"class2\">superwarhero</label><input type=\"checkbox\" id=\"class2\" name=\"Elemento\" value=\"class2\" ><br>\n\t<label for=\"money\">Soldi</label><input type=\"checkbox\" id=\"money\" name=\"Elemento\" value=\"money\" ><br>\n\t<label for=\"potion\">Pozioni</label><input type=\"checkbox\" id=\"potion\" name=\"Elemento\" value=\"potion\" ><br>\n\t<label for=\"poison\">Veleni</label><input type=\"checkbox\" id=\"poison\" name=\"Elemento\" value=\"poison\" ><br>\n\t<label for=\"trap\">Trappole</label><input type=\"checkbox\" id=\"trap\" name=\"Elemento\" value=\"trap\" ><br>\n\t<label for=\"classitem\">Oggetti di classe</label><input type=\"checkbox\" id=\"classitem\" name=\"Elemento\" value=\"classitem\" ><br>\n\t<label for=\"competency\">Competenze</label><input type=\"checkbox\" id=\"competency\" name=\"Elemento\" value=\"competency\" ><br>\n\t</div>\n\t</form>`\n\n\tconst checked = await Dialog.prompt({\n\t\ttitle: \"Scegli tipologia di oggetti da eliminare\",\n\t\tlabel: \"OK\",\n\t\trejectClose: false,\n\t\tcontent,\n\t\tcallback: async(html)=>check()\n\t});\n\n\tmyarray=checked.split(\",\");\n\tfor (var j = 0; j < myarray.length; j++) {\n\t\ta=myarray[j].split(\"=\");\n\t\t//console.log(\"ciclo=\"+j+\" valore: \"+a);\n\t\tif(a[1]==\"false\"){\n\t\t\t//console.log(\"a[0] è uguale a \"+a[0]+\" a[1] è false e quindi gli oggetti di questo tipo vanno rimangono\");\n\t\t}else{\n\t\t\t//console.log(\"a[0] è uguale a \"+a[0]+\" a[1] è true e quindi gli oggetti di questo tipo vanno eliminati\");\n\t\t\tif(a[0]==\"all\"){\n\t\t\t\t//console.log(\"a[0] è all\");\n\t\t\t\tlet actor = token.actor;\n\t\t\t\t// Ottieni un array con gli ID di tutti gli items dell'attore\n\t\t\t\tlet itemIds = actor.items.map(i => i.id);\n\t\t\t\t// Elimina tutti gli items dell'attore\n\t\t\t\tactor.deleteEmbeddedDocuments(\"Item\", itemIds);\n\t\t\t}else if(a[0]==\"class\"){\n\t\t\t\t\t//console.log(\"classe\")\n\t\t\t\t\tactor.items.forEach(it => { if (it.type == \"class\") {\n\t\t\t\t\t\tif (it.system.issecondary==false){\n\t\t\t\t\t\t//console.log(\"Elimino \"+a[0] + \" \"+it.name+\" \"+it.system.issecondary)\n\t\t\t\t\t\tit.delete()\n\t\t\t\t\t\t}\n\t\t\t\t\t}})\n\t\t\t}else if(a[0]==\"class2\"){\n\t\t\t\t//console.log(\"superwarhero\")\n\t\t\t\tactor.items.forEach(it => { if (it.type == \"class\") {\n\t\t\t\t\tif (it.system.issecondary){\n\t\t\t\t\t\t//console.log(\"Elimino \"+a[0] + \" \"+it.name+\" \"+it.system.issecondary)\n\t\t\t\t\t\tit.delete()\n\t\t\t\t\t}\t\t\t\t\t\n\t\t\t\t}})\n\t\t\t\t//console.log(\"superwarhero\")\n\t\t\t}else{\n\t\t\t\t//Equipaggiamento magico\n\t\t\t\t//Equipaggiamento normale\n\t\t\t\t//abilità di razza\n\t\t\t\t//abilità di classe\n\t\t\t\t//abilità aggiuntive (livello 9 quindi date comunque da abi di razza o classe)\n\t\t\t\t//abilità aggiuntive (presa da livelli)\n\t\t\t\t//Condizioni permanenti\n\t\t\t\t//Condizioni temporanee\n\t\t\t\tactor.items.forEach(it => { if (it.type == a[0]) {\n\t\t\t\t\t//console.log(\"Elimino \"+a[0] + \" \"+it.name)\n\t\t\t\t\tit.delete()\n\t\t\t\t}})\n\t\t\t}\n\t\t}\n\t}\n}\n\n\nfunction check(){\n\tvar checkboxes = document.getElementsByName(\"Elemento\");\n\tvar checked = [];\n\t//console.log(checkboxes_talenti.length+\" \"+checkboxes.length)\n\n\tfor (var i = 0; i < checkboxes.length; i++) {\n\t\tchecked.push(checkboxes[i].value+\"=\"+checkboxes[i].checked);\n\t}\n\n\tchecked=checked.join(\",\")\n\tconsole.log(checked);\n\treturn checked;\n}"
