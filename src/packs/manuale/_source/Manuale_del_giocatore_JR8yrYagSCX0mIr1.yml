  - sort: 500000
    name: Lista veleni
    type: text
    _id: miZN9xsZPdGVoZtm
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>Esistono molti tipi di veleno, alcuni dei quali mortali. Un
        avvelenamento può accadere a causa di un’arma avvelenata, di una
        creatura o pianta naturalmente velenose , oppure consumando cibo e
        bevande. Vedi la descrizione di ciascuno di essi per ulteriori
        dettagli.</p><p>Ogni veleno ha un nome, un prezzo e uno o più metodi
        nella quale ha effetto. Può essere applicato su un arma [A] e quindi
        funziona solo se il colpo và a segno, ingerito [I] quindi se il
        personaggio lo beve, a tocco [T] se un personaggio tocca il veleno. fra
        parentesi tondi invece il prezzo di creazione del veleno. Chi sa fare i
        veleni li riconosce subito altrimenti posso essere identificati con
        @Compendium[fvtt-warhero.poteri.4YCGLK5hBA1dymta]{Conoscenze - III
        Identificare} o con un tiro di conoscenze  [[/r
        1d20+@attributes.knowledge.value #Tiro conoscenza per riconoscere
        veleno]]. Se un veleno non è identificato allora questo è l' oggetto
        @Compendium[fvtt-warhero.equipaggiamento.obDoJiv3ZmluwsQl]{Boccetta o
        fiala (piena) con
        veleno}</p><p></p><p>@Compendium[fvtt-warhero.veleni.TEeDbXeMjFU8Udob]{Veleno
        danno} [ A,I ] (30), Questo veleno infligge [[/r 2d6 danni]], [[/r
        1d20+@statistics.str.save #CD 14 per negare veleno danno]] CD 14 FIS
        Nega.</p><p>@Compendium[fvtt-warhero.veleni.6euD8B0TqXNo2oxq]{Veleno
        danno maggiore} [ A,I ] (80), Questo veleno infligge [[/r 5d6 danni]],
        [[/r 1d20+@statistics.str.save #CD 15 per negare veleno danno maggiore]]
        CD 15 FIS
        Nega.</p><p>@Compendium[fvtt-warhero.veleni.36dxnHkltanwC3tM]{Veleno
        danno superiore} [ A,I ] (120), Questo veleno infligge [[/r 10d6
        danni]], [[/r 1d20+@statistics.str.save #CD 15 per negare veleno danno
        superiore]] CD 16 FIS
        Nega.</p><p>@Compendium[fvtt-warhero.veleni.87x8gGWNxb7X8kxo]{Veleno
        sonno} [ I,T ] (300), il bersaglio deve effettuare un tiro salvezza su
        Men [[/r 1d20+@statistics.min.save #CD 15 per negare veleno sonno]] CD
        15 per negare gli effetti di cadere in un sonno
        profondo.</p><p>@Compendium[fvtt-warhero.veleni.J9VfXdkmnGACR2XE]{Veleno
        oblio} [ I,T ] (300), il bersaglio deve effettuare un tiro salvezza su
        Men [[/r 1d20+@statistics.min.save #CD 15 per negare veleno oblio]] CD
        15 per negare gli effetti di perdere la memoria dell'ultima ora
        vissuta.</p><p>@Compendium[fvtt-warhero.veleni.lgTBTFQfrgdY0xim]{Veleno
        morte} [ A,I ] (2000), il bersaglio deve effettuare un tiro salvezza su
        Fis [[/r 1d20+@statistics.str.save #CD 14 per negare veleno morte]] CD
        14 per negare gli effetti di morire sul
        colpo.</p><p>@Compendium[fvtt-warhero.veleni.TcRhB8ndlkSOejaD]{Veleno d'
        amore} [ I,T ] (300), il bersaglio deve effettuare un tiro salvezza su
        Men [[/r 1d20+@statistics.min.save #CD 15 per negare veleno d'amore]] CD
        15 per negare gli effetti di innamorarsi della prima persona di sesso
        opposto che
        incontra</p><p>@Compendium[fvtt-warhero.veleni.IxEQEwMzdKlx7bbP]{Veleno
        paralisi} [ A,I,T ] (340), il bersaglio deve effettuare un tiro salvezza
        su FIS [[/r 1d20+@statistics.str.save #CD 15 per negare veleno
        paralisi]] CD 15 per negare gli effetti di non poter effettuare nessuna
        mossa di movimento per i successivi 5
        minuti.</p><p>@Compendium[fvtt-warhero.veleni.bB8yHjLXD3G7364K]{Veleno
        stordito} [ A,I,T ] (300), il bersaglio deve effettuare un tiro salvezza
        su FIS [[/r 1d20+@statistics.str.save #CD 14 per negare veleno
        stordito]] CD 14 per negare gli effetti di perdere una mossa per i
        successivi 3
        round.</p><p>@Compendium[fvtt-warhero.veleni.kaNsZDLXFu2cTc5F]{Veleno
        debilitante} [ A,I,T ] (300), il bersaglio deve effettuare un tiro
        salvezza su FIS [[/r 1d20+@statistics.str.save #CD 14 per negare veleno
        debilitante]] CD 14 per negare gli effetti di perdere -2 a FIS
        Temporaneo.</p><p>@Compendium[fvtt-warhero.veleni.lutaCIcCr7JKlEf9]{Veleno
        disorientante} [ A,I,T ] (300), il bersaglio deve effettuare un tiro
        salvezza su FIS [[/r 1d20+@statistics.str.save #CD 14 per negare veleno
        disorientnate]] CD 14 per negare gli effetti di perdere -2 a IST
        Temporaneo.</p><p>@Compendium[fvtt-warhero.veleni.AGBFkvegWaailJ7s]{Veleno
        mnemonico} [ A,I,T ] (300), il bersaglio deve effettuare un tiro
        salvezza su FIS [[/r 1d20+@statistics.str.save #CD 14 per negare veleno
        mnemonico]] CD 14 per negare gli effetti di perdere -2 a MEN
        Temporaneo.</p><p></p><p>E’ possibile lanciare una boccetta di veleno
        come se fosse un'arma da lancio. Se si colpisce il bersaglio si
        applicano gli effetti se il veleno era a tocco.</p>
