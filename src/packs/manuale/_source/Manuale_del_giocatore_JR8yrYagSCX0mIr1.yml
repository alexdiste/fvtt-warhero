  - sort: 156250
    name: Gestione inventario
    type: text
    _id: uYaZg4s5dwzuOV8y
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>Per semplificare la gestione dell’inventario, i personaggi possono
        trasportare dodici elementi in aggiunta all’armatura indossata, all’arma
        primaria, ed eventualmente allo scudo impugnato, fino a sei oggetti di
        piccole dimensioni possono essere facilmente appesi alla cintura o alla
        tracolla, ma tutto il resto deve poter entrare nello zaino. Piccole
        quantità di oggetti contano come un singolo elemento (vedi sotto). Il
        Game Master può decidere che gli oggetti pesanti o di grandi dimensioni
        possano contare come 2 o 3 oggetti semplici (deve prendere in
        considerazione le dimensioni di un normale zaino). Personaggi
        pesantemente carichi possono subire una penalità a IST secondo quanto
        deciso dal GM. Per ricapitolare</p><p>12 slot per gli oggetti nello
        zaino</p><p>6 slot di piccoli oggetti da appendere alla cintura o
        tracolla</p><p>4 slot per le borse da cintura</p><p>1 slot
        faretra</p><p>I contenitori come una borsa da cintura, porta mappe ecc…
        occupano 1 slot ma a loro volta permettono di portare del materiale al
        loro interno</p><h2>Oggetti impilabili</h2><p>Piccole quantità di
        oggetti:</p><p>5
        @UUID[Compendium.fvtt-warhero.equipaggiamento.SHIuwc7ia5WVyuvO]{Ampolle
        (vuota)} (se messe nello zaino, altrimenti occupano 1 slot in borsa da
        cintura o porta pozioni)</p><p>5
        @UUID[Compendium.fvtt-warhero.equipaggiamento.nGO18McABxAbLKdC]{Torcie}</p><p>20
        @UUID[Compendium.fvtt-warhero.munizioni.2pcQKWuQGvAgRFxY]{Freccie}</p><p>20
        @UUID[Compendium.fvtt-warhero.munizioni.4HbP6eXNNLxBBpj3]{Aghi da
        cerbottana}</p><p>20
        @UUID[Compendium.fvtt-warhero.munizioni.8kAg0umYGjyMVLhY]{Sassi}</p><p>10
        @UUID[Compendium.fvtt-warhero.equipaggiamento.q4npQ8ugBDWEMGAd]{Candele}</p><p>Ogni
        3 metri di
        @UUID[Compendium.fvtt-warhero.equipaggiamento.C9QzkekROkBNzchd]{Catene}</p><p>Ogni
        15 metri di corda, sia
        @UUID[Compendium.fvtt-warhero.equipaggiamento.gwVn05zvpecmNsz1]{di
        canapa} che di
        @UUID[Compendium.fvtt-warhero.equipaggiamento.67ZDk1iDwaWOZKtI]{Corda di
        seta}</p><p>50 gemme</p><p>1000
        @UUID[Compendium.fvtt-warhero.equipaggiamento.G3yFDfyey4Ef4JT4]{Monete o
        pezzi di oro}</p><p>1000
        @UUID[Compendium.fvtt-warhero.equipaggiamento-per-classi.9uDwrtWMbqirF7Fq]{Scorte
        da Alchimista}</p><p>1000
        @UUID[Compendium.fvtt-warhero.equipaggiamento-per-classi.Item.dLqFcWtIJiO8Lkc6]{Componenti
        magici}</p><p>contano come un singolo elemento e quindi occupano un solo
        slot</p><h2>Inventario equipaggiabile</h2><p>Ogni personaggio può avere
        addosso massimo uno
        @UUID[Compendium.fvtt-warhero.equipaggiamento.yaMGWfYHqOTv4qro]{Zaino},
        una
        @UUID[Compendium.fvtt-warhero.equipaggiamento.khCz2IusaQ52cLyW]{Cintura}
        e 3
        @UUID[Compendium.fvtt-warhero.equipaggiamento.woh61qENSGkqZbjB]{Borsa da
        cintura}, le 3 borse occupano uno slot o nella cintura o nello zaino ed
        è possibile aggiungere una
        @UUID[Compendium.fvtt-warhero.equipaggiamento.jaTLrfcSq2PyBXx1]{Faretra}
        a questi slot. Non puoi portare più di un anello per
        dito.</p><h2>Inventario di partenza</h2><p>Quando un personaggio inizia
        la sua avventura, parte con
        @UUID[Compendium.fvtt-warhero.vestiti.5yleK3OYsVeJWjkN]{Abito da
        viaggiatore},
        @UUID[Compendium.fvtt-warhero.equipaggiamento.yaMGWfYHqOTv4qro]{Zaino},
        @UUID[Compendium.fvtt-warhero.equipaggiamento.khCz2IusaQ52cLyW]{Cintura},
        3 *
        @UUID[Compendium.fvtt-warhero.equipaggiamento.woh61qENSGkqZbjB]{Borsa da
        cintura} e 500
        @UUID[Compendium.fvtt-warhero.equipaggiamento.G3yFDfyey4Ef4JT4]{Moneta
        di
        oro}</p><p>@UUID[Compendium.fvtt-warhero.manuale.JournalEntry.g4KBDQAp2l3hDbj3.JournalEntryPage.mSX5nd5qyc62uhox]{Oggetti
        di partenza}</p>
      markdown: ''
