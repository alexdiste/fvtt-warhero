  - sort: 150000
    name: Adeguamento per foundry Virtual Table top
    type: text
    _id: WIjcMxvLqft3IsMT
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>Per adeguare warhero a Foundry virtual table top leggere le
        indicazioni qui sotto. Queste sono da intendersi come modifiche alle
        regole</p><h2>Gittate</h2><p>Gittate e range sono tutte dimezzate
        quindi:</p><p>Armi da lancio – massimo 10 metri</p><p>Armi da tiro –
        massimo 30 metri</p><p>Poteri di livello I – massimo 10
        metri</p><p>Poteri di livello II – massimo 20 metri</p><p>Poteri di
        livello III – massimo 30 metri</p><p>Poteri di livello IV – massimo 40
        metri</p><h2>Illuminazione</h2><p>Su warhero non c'é la distinzione tra
        luce brillante e soffusa. Non esistono i concetti di Dim e bright light.
        Una zona o é illuminata o non lo é. Usare la macro WH - Luci e Ombre .
        Comunque le fonti di luce sono:</p><ul><li><p>Torcia e Torcia
        inestinguibile 4 quadretti di luce</p></li><li><p>Lampada comune 5
        quadretti di luce</p></li><li><p>Lanterna schermabile se aperta 6
        quadretti di luce oppure 1</p></li><li><p>Potere Luce magica 5 quadretti
        di luce</p></li></ul>
