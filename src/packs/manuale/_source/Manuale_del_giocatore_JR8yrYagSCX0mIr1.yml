  - sort: 400000
    name: Lista trappole
    type: text
    _id: 2POUuWQUok28Zm3u
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>Le descrizioni delle varie trappole includono le Informazioni del
        danno che viene causato con il relativo tiro salvezza, fra parentesi
        quadre [ ] la classe difficoltà per individuare la trappola e fra
        parentesi tonde ( ) la difficoltà per disinnescarla, questi sotto sono
        solo alcuni esempi di trappole. [[/r
        1d20+@ist]]</p><p>@Compendium[fvtt-warhero.trappole.gm6IABRodVYaZQCE]{Freccia
        base} : Attacco [[/r 1d20+3]] [[/r 2d6 #freccia]] [14]
        (14).</p><p>@Compendium[fvtt-warhero.trappole.lpsGEEx4umquMkKx]{Fossa
        camuffata} : [[/r 1d6 #danni da caduta]] ogni 3 metri di profondità tiro
        salvezza CD 14 IST per negare gli effetti [15]
        (12).</p><p>@Compendium[fvtt-warhero.trappole.OrNP0wQcgStgCnWt]{Dardo
        velenoso} : Attacco [[/r 1d20+3]] [[/r 1d6 #Aggiungi anche effetto del
        veleno]]+veleno [16]
        (16)</p><p>@Compendium[fvtt-warhero.trappole.xFzZuPBl0LfprcJt]{Rete
        grande} : Attacco [[/r 1d20+3]] Salvataggio CD 14 IST per negare o
        rimanere impigliati nella rete per 3 round [12]
        (16)</p><p>@Compendium[fvtt-warhero.trappole.CWA23xoasfzvYyDI]{Blocco
        cadente} : Attacco [[/r 1d20+3]] [[/r 6d6 #da schiacciamento]] [17]
        (17)</p><p>@Compendium[fvtt-warhero.trappole.qVarPzqpoZr0RoQq]{Punte da
        muro avvelenate}: Attacco [[/r 1d20+1]] [[/r 1 #Aggiungi anche effetto
        del veleno]]+veleno [15] (18)</p>
