        <h1>Informazioni di licenza</h1><p>Ultima versione del regolamento: <a
        href="https://www.warhero.it/warhero-amazon.pdf">warhero-amazon.pdf</a></p><h2>Annotazioni/Diari/Journal</h2><p>Come
        prima cosa consiglio di abilitare la visione dei diari/annotazioni nella
        mappa. Per farlo navigate nei controlli di sinistra fino a Annotazioni
        (o Journal se lo avete in inglese) e poi premete il simbolo della lente
        di ingrandimento (Attiva/Disattiva visualizzazione Annotazioni). Se
        Icona rimane di un colore piena allora é attiva e dovreste poter vedere
        le annotazioni nella mappa</p>
