  - sort: 300000
    name: Lista pozioni
    type: text
    _id: aefYdCU8oBSFgLyr
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>Le pozioni hanno poteri particolari che si attivano quando vengono
        bevute. Chi sa fare le pozioni le riconosce automaticamente altrimenti
        possono essere identificate dal potere
        @Compendium[fvtt-warhero.poteri.4YCGLK5hBA1dymta]{Conoscenze - III
        Identificare}. Se una pozione non è identificata allora questo è l'
        oggetto
        @UUID[Compendium.fvtt-warhero.pozioni.Item.YTOlgCeJCTZgzQJ8]{Pozione
        (non
        identificata)}</p><p></p><p>@UUID[Compendium.fvtt-warhero.pozioni.Item.tA4F0tjbHzzB7owQ]{Pozione
        di Saltare} [50Mo]: offre un bonus di +3 alle prove di saltare durante
        l'intera giornata [[/r 1d20+@statistics.str.value+3 #Saltare con +3
        della
        pozione]]</p><p>@UUID[Compendium.fvtt-warhero.pozioni.Item.ZXIkWNjoAEkvrfTP]{Pozione
        di Movimenti del ragno} [150Mo]: offre la possibilità di arrampicarsi in
        qualsiasi superficie per 10
        round.</p><p>@UUID[Compendium.fvtt-warhero.pozioni.Item.9T2HrgEliae6amxo]{Pozione
        di cura ferite} [25Mo]: cura il bersaglio di [[/r 2d6 #cura ferite]]
        punti
        ferita.</p><p>@UUID[Compendium.fvtt-warhero.pozioni.Item.M99NCV0bFbBZbxGu]{Pozione
        di nuotare} [50Mo]: offre un bonus di +3 alle prove di nuotare durante
        l'intera giornata [[/r 1d20+@statistics.str.value+3 #Nuotare con +3
        della
        pozione]]</p><p>@UUID[Compendium.fvtt-warhero.pozioni.Item.jPnruek3K4mYYkyW]{Pozione
        di Parlare con gli animali} [100Mo]: permette di parlare con gli animali
        per 10
        minuti.</p><p>@UUID[Compendium.fvtt-warhero.pozioni.Item.8JUbdWhlkP3ifMPe]{Pozione
        di scurovisione} [450Mo]: permette di vedere al buio per l'intera
        giornata</p><p>@UUID[Compendium.fvtt-warhero.pozioni.Item.Bg52zJyzyhYRaxXx]{Pozione
        di cura ferite maggiori} [75Mo]: cura il bersaglio di [[/r 5d6 #cura
        ferite maggiori]] punti
        ferita.</p><p>@UUID[Compendium.fvtt-warhero.pozioni.Item.SfUYe6NH7CJ2DnXb]{Pozione
        di Levitazione} [80Mo]: permette di essere sotto l'effetto del potere
        @Compendium[fvtt-warhero.poteri.j7RjSZH85KRovJKc]{Viaggio - I
        Levitazione} della sfera di
        @Compendium[fvtt-warhero.sfere-di-magia.IHxRgAwl2K6J760H]{31.Viaggio}</p><p>@UUID[Compendium.fvtt-warhero.pozioni.Item.T1hgKVJ4kmKmTnzN]{Pozione
        di aiuto} [20Mo]: si ottiene un bonus di +2 al prossimo
        TxC.</p><p>@UUID[Compendium.fvtt-warhero.pozioni.Item.74BbrRQZqOZeahTM]{Pozione
        di Invisibilità}[300Mo]: si diventa invisibili per 10 round o fino a che
        non si effettua una azione
        ostile.</p><p>@UUID[Compendium.fvtt-warhero.pozioni.Item.QItjK71OU0Wh4Kya]{Pozione
        di Comprendere linguaggi} [350Mo]: permette di comprendere qualsiasi
        linguaggio per l'intera
        giornata.</p><p>@UUID[Compendium.fvtt-warhero.pozioni.Item.8l3gLkLgFO3vSC9l]{Pozione
        di Linguaggi}[700Mo]: permette di parlare e comprendere qualsiasi
        linguaggio per l'intera
        giornata.</p><p>@UUID[Compendium.fvtt-warhero.pozioni.Item.8UoyPW1gx5sq0Xdg]{Pozione
        di rimuovi paralisi} [120Mo]: rimuove la paralisi dal
        bersaglio.</p><p>@UUID[Compendium.fvtt-warhero.pozioni.Item.x5Oi5vkZPmp51Goc]{Pozione
        di Rimuovi cecità/sordità} [120Mo]: rimuove la cecità/sordità dal
        bersaglio.</p><p>@UUID[Compendium.fvtt-warhero.pozioni.Item.Acl38axBLkcFzWvK]{Pozione
        di Rimuovi malattie} [120Mo]: rimuove la malattie dal
        bersaglio.</p><p>@UUID[Compendium.fvtt-warhero.pozioni.Item.18MKsdWRVcRNuS8T]{Pozione
        di Rimuovi veleno} [120Mo]: rimuove la veleno dal
        bersaglio.</p><p>@UUID[Compendium.fvtt-warhero.pozioni.Item.hRphen4UAPq1qZdY]{Pozione
        di Cura ferite totale} [350Mo]: cura il bersaglio di [[/r 4d10 #cura
        ferite totali]] punti
        ferita.</p><p>@UUID[Compendium.fvtt-warhero.pozioni.Item.en8Px7LjWTVHvu1O]{Pozione
        di volare}[480Mo]: permette di essere sotto l'effetto del potere
        @Compendium[fvtt-warhero.poteri.1on8iKAjWzcbJkBd]{Viaggio - II Volare}
        della sfera
        @Compendium[fvtt-warhero.sfere-di-magia.IHxRgAwl2K6J760H]{31.Viaggio}</p><p>@UUID[Compendium.fvtt-warhero.pozioni.Item.githKKOvRn6cOEiV]{Pozione
        di Respirare sott'acqua} [150Mo]: Permette di respirare sott'acqua per 8
        ore.</p><p>@UUID[Compendium.fvtt-warhero.pozioni.Item.RHqZ5e0Oj8LAmd40]{Pozione
        di Verità}[300Mo]: una volta bevuta questa pozione il soggetto
        risponderà in maniera veritiera alla prima domanda a lui
        posta.</p><p>@UUID[Compendium.fvtt-warhero.pozioni.Item.r3wCxo1c146EyjiN]{Pozione
        di Verità superiore} [750Mo]: una volta bevuta questa pozione il
        soggetto risponderà in maniera veritiera alle prossime 3
        domande</p><p>@UUID[Compendium.fvtt-warhero.pozioni.Item.I0T96Z7WLyygPHcx]{Pozione
        di Protezione dagli elementi (freddo)} [50Mo]: riduce i danni di questo
        elemento di 2 per l'intera
        giornata.</p><p>@UUID[Compendium.fvtt-warhero.pozioni.Item.zIAMInIhiX8rUoMp]{Pozione
        di Protezione dagli elementi (elettricità)} [50Mo]: riduce i danni di
        questo elemento di 2 per l'intera
        giornata.</p><p>@UUID[Compendium.fvtt-warhero.pozioni.Item.be3w6A5mWQeuukXj]{Pozione
        di Protezione dagli elementi (fuoco)} [50Mo]: riduce i danni di questo
        elemento di 2 per l'intera
        giornata.</p><p>@UUID[Compendium.fvtt-warhero.pozioni.Item.sflVwBMff3FazHtM]{Pozione
        di Protezione dagli elementi (acido)} [50Mo]: riduce i danni di questo
        elemento di 2 per l'intera
        giornata.</p><p>@UUID[Compendium.fvtt-warhero.pozioni.Item.S0q4zrjY1hNEa8cP]{Pozione
        di Protezione dagli elementi (suono)} [50Mo]: riduce i danni di questo
        elemento di 2 per l'intera
        giornata.</p><p>@UUID[Compendium.fvtt-warhero.pozioni.Item.qm2SEH7HIOM7qKRN]{Pozione
        di Protezione dagli elementi maggiore (freddo)} [120Mo]: riduce i danni
        di questo elemento di 5 per l'intera
        giornata.</p><p>@UUID[Compendium.fvtt-warhero.pozioni.Item.FqokFKoDqqkRELdJ]{Pozione
        di Protezione dagli elementi maggiore (elettricità)} [120Mo]: riduce i
        danni di questo elemento di 5 per l'intera
        giornata.</p><p>@UUID[Compendium.fvtt-warhero.pozioni.Item.cAa2hgT0xEZvU3rL]{Pozione
        di Protezione dagli elementi maggiore (fuoco)} [120Mo]: riduce i danni
        di questo elemento di 5 per l'intera
        giornata.</p><p>@UUID[Compendium.fvtt-warhero.pozioni.Item.QM4pAd6BXAFMpgWL]{Pozione
        di Protezione dagli elementi maggiore (acido)} [120Mo]: riduce i danni
        di questo elemento di 5 per l'intera
        giornata.</p><p>@UUID[Compendium.fvtt-warhero.pozioni.Item.aXnI4hVSrnCKRnGo]{Pozione
        di Protezione dagli elementi maggiore (suono)}[120Mo]: riduce i danni di
        questo elemento di 5 per l'intera
        giornata.</p><p>@UUID[Compendium.fvtt-warhero.pozioni.Item.0qi6hn01kgTibcJt]{Pozione
        di velocità}[900Mo]: permette di essere sotto l'effetto del potere
        @Compendium[fvtt-warhero.poteri.O1yGotIS8YidAFh1]{Tempo - III Velocità}
        della sfera
        @Compendium[fvtt-warhero.sfere-di-magia.3VbZtxz7d2gJRzzz]della sfera
        {28.Tempo}</p>
