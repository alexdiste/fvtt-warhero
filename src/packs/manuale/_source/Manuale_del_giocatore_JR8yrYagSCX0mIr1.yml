  - sort: 600000
    name: Lista malattie
    type: text
    _id: hZ4FiVSBWJO22vvm
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>Un Tiro su MEN [[/r 1d20+@statistics.min.value #Tiro mente]] positivo
        permette di diagnosticare e curare una malattia (il Game Master può
        decidere che tuttavia ciò non sia possibile) facendola recedere alla sua
        forma più lieve e di minore durata. Ovviamente è necessario disporre di
        attrezzi necessari per la guarigione. Le malattie hanno sintomi diversi
        e si diffondono con varie modalità. Alcune malattie tipiche sono
        riassunte di seguito. CD indica la CD del tiro salvezza su FIS
        necessario per prevenire l’infezione. Incubazione indica il tempo prima
        che il danno abbia inizio e Danni elenca i danni alle caratteristiche
        che il personaggio subirà dopo l’incubazione e ogni giorno a
        seguire.</p><p>@UUID[Compendium.fvtt-warhero.malattie.Item.UX3fRaMM3eea2orf]{Malattia
        - Infermità accecante}: Si diffonde in acque contaminate. Ingestione.
        [[/r 1d20+@statistics.str.save #CD16 per resistere a Infermità
        Accecante]] CD 16, [[/r 1d3]] giorni, -1 FIS, se subisce più di 2 danni
        a FIS deve fare un altro salvataggio o rimane accecato
        permanentemente.</p><p>@Compendium[fvtt-warhero.malattie.GUxXpmmkac3LfFBW]{Malattia
        - Febbre da gallina}: febbre alta, disorientamento, frequenti attacchi
        di risate incontrollabili. Inalazione, [[/r 1d20+@statistics.str.save
        #CD16 per resistere a Febbre da Gallina]] CD 16, 1 giorno, –2
        MEN.</p><p>@Compendium[fvtt-warhero.malattie.rEVdibsvrnydN4VY]{Malattia
        - Febbre demoniaca}: Ferimento. [[/r 1d20+@statistics.str.save #CD18 per
        resistere a Febbre demoniaca]] CD18, 1 giorno, –1 FIS. -1FIS se fallisce
        un secondo tiro salvezza su
        Tempra.</p><p>@Compendium[fvtt-warhero.malattie.96hTAU2dZKFX13IA]{Malattia
        - Brividi diabolici}: La diffondono alcuni demoni, ferimento. [[/r
        1d20+@statistics.str.save #CD14 per resistere a Brividi Diabolici]]
        CD14, 1d4 giorni, -1 FIS. Richiede 3 tiri salvezza per
        guarire.</p><p>@Compendium[fvtt-warhero.malattie.0rcW90JwWwRgI42l]{Malattia
        - Febbre lurida}: La diffondono ratti e otyugh. Può essere contratta
        anche da ferimento in ambiente malsano. [[/r 1d20+@statistics.str.save
        #CD15 per resistere a Febbre lurida]] CD15, 1d3 giorni, –1 FIS e -1
        IST.</p><p>@Compendium[fvtt-warhero.malattie.9JSRZCY7EGCBWgMn]{Malattia
        - Fuoco mentale}: Sembra che il cervello stia bruciando. Provoca
        stupore. Inalazione, [[/r 1d20+@statistics.str.save #CD12 per resistere
        a Fuoco Mentale]] CD 12, 1 giorno, –1
        MEN.</p><p>@Compendium[fvtt-warhero.malattie.9mkw4UtMY4OtmEdT]{Malattia
        - Peste bubbonica}: Ferimento o inalazione. [[/r
        1d20+@statistics.str.save #CD17 per resistere a Peste Bubbonica]] CD 17,
        1 giorno, -1 FIS e -1MEN e il bersaglio è
        affaticato.</p><p>@Compendium[fvtt-warhero.malattie.vWLpnIvKssftkTg0]{Malattia
        - Lebbra}: Contatto, inalazione, ferimento. [[/r
        1d20+@statistics.str.save #CD18 per resistere a Lebbra]] CD 18 per
        evitarne gli effetti, [[/r 2d4]] settimane, -3
        MEN.</p><p>@Compendium[fvtt-warhero.malattie.5keHW4rPeCnEFGPy]{Malattia
        - Malattia rossa}: La pelle si arrossa, si gonfia, ed è calda al tocco.
        Ferimento, [[/r 1d20+@statistics.str.save #CD15 per resistere a Malattia
        Rossa]] CD 15, 1d3 giorni, -1
        FIS.</p><p>@Compendium[fvtt-warhero.malattie.j2dFhFh4PfnTkExh]{Malattia
        - Tremarella}: Provoca spasmi involontari, tremori, e fitte. Contatto,
        [[/r 1d20+@statistics.str.save #CD13 per resistere a Tremarella]] CD 13,
        1 giorno, –1
        IST.</p><p>@Compendium[fvtt-warhero.malattie.c9dtPrXehHzha8FP]{Malattia
        - Devastazione vischiosa}: La vittima si trasforma in poltiglia
        infettiva dall’interno Contatto, [[/r 1d20+@statistics.str.save #CD14
        per resistere a Devastazione vischiosa]] CD 14, 1 giorno, –2 FIS. -1FIS
        permanente se fallisce un secondo tiro salvezza su FIS</p>
