  - sort: 700000
    name: Poteri, magie e sfere di magie
    type: text
    _id: J0CW5ZvfSlYwmNUp
    title:
      show: true
      level: 1
    image: {}
    text:
      format: 1
      content: >-
        <p>I poteri (o magie) si dividono in sfere. I personaggi in grado di
        farne uso conoscono alcune di queste sfere, in funzione alla classe
        scelta. Ogni sfera è composta da un potere di livello I, uno di livello
        II ed uno di livello III, ( e fino a due di livello IV che un
        personaggio che padroneggia quella sfera di base non conosce). Il
        livello corrisponde al numero di punti mana che sono spesi per il lancio
        di quel potere. Gli effetti di poteri differenti si sommano, dove non
        diversamente specificato, ma non è possibile cumulare l'effetto dello
        stesso potere o di un potere con lo stesso nome, appartenente ad una
        diversa sfera. Il raggio di effetto di un potere corrisponde a quanto il
        personaggio è in grado di vedere, se non diversamente specificato. La
        durata di un potere se non descritto nel potere stesso termina a fine
        giornata. Per poter lanciare un potere è sempre necessario potersi
        muovere e poter parlare. E' possibile evitare completamente o in parte
        l'effetto di un potere, quando la sua descrizione lo permette. In tal
        caso è fissata una CD per il tiro e la caratteristica di
        riferimento.</p><h2>Lista sfere di magia</h2><p>Warhero ha attualmente
        32 sfere di magie e queste
        sono:</p><p>@UUID[Compendium.fvtt-warhero.sfere-di-magia.Item.Q8EL4AZ7eWFwczHk]{01.Ammaliamento}</p><p>@UUID[Compendium.fvtt-warhero.sfere-di-magia.Item.cs6Y0TWt6wKuvQ4w]{02.Conoscenze}</p><p>@UUID[Compendium.fvtt-warhero.sfere-di-magia.Item.ukQlFEIZ7PO2s1EE]{03.
