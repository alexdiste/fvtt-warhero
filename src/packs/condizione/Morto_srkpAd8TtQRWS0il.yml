  description: >-
    <p>Il personaggio ha fallito il tiro
    di&nbsp;@Compendium[fvtt-warhero.azioni.qwyfZ3H65J0dl1FQ]{Sfidare la morte}
    ed &egrave; ora morto. Pu&ograve; essere resuscitato con due poteri:</p>

    <p>@Compendium[fvtt-warhero.poteri.Tnbo5qZBLCiZAli4]{Guarigione - III
    Resurrezione}</p>

    <p>@Compendium[fvtt-warhero.poteri.6Z73jbvTwFqsiKOw]{Negromanzia - III
    Resurrezione veloce}</p>

    <p>&nbsp;</p>

    <p>Se resuscitato con
    @Compendium[fvtt-warhero.poteri.6Z73jbvTwFqsiKOw]{Negromanzia - III
    Resurrezione veloce} mettere su di lui lo stato
    @Compendium[fvtt-warhero.condizione.ABPd5CgYSpGqI7PD]{Resuscitato
    negromanticamente (-1 a FIS)} e su chi lo ha resuscitato
    @Compendium[fvtt-warhero.condizione.MEjxqVSJFjRpDhLA]{In recupero da
    resurrezione veloce}</p>

    <p>&nbsp;</p>

    <p>Se resuscitato da
    @Compendium[fvtt-warhero.poteri.Tnbo5qZBLCiZAli4]{Guarigione - III
    Resurrezione} invece mettere
    @Compendium[fvtt-warhero.condizione.4uAaXtxhzymkTR3z]{Resuscitato di
    recente} al pg che ha subito il potere (se abilit&agrave; di classe, come
    quella del Classe: Taumaturgo non dicano altrimenti)</p>

    <p>&nbsp;</p>

    <p>Il personaggio che &egrave; stato resuscitato pu&ograve; usare le macro
    @Compendium[fvtt-warhero.macro.8Z3rceQoggLzjaw8]{Resuscitato con
    resurrezione} o @Compendium[fvtt-warhero.macro.m1WuKj8USCqtdXZH]{Resuscitato
    con resurrezione rapida} per avere degli automatismi.</p>
