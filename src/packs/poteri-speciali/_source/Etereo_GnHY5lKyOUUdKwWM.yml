  description: >-
    <p>Le creature eteree sono invisibili, impercettibili, inconsistenti e
    inodori. La maggior parte degli attacchi magici non ha alcun effetto su di
    loro. Una creatura eterea pu&ograve; vedere e sentire in un raggio di 30
    metri, anche se gli oggetti materiali possono comunque bloccare la vista e
    il suono. Le cose, per&ograve;, le appaiono grigie, indistinte e spettrali.
    Poteri di danno della sfera di forza hanno effetto su queste creature. Le
    creature eteree si muovono in qualsiasi direzione e non vengono bloccate
    dagli oggetti materiali.</p>
