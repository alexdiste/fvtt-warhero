  description: >-
    <p>Una creatura con Travolgere pu&ograve; usare le sue 2 mosse per fare un
    movimento e calpestare qualsiasi avversario pi&ugrave; piccolo di lui
    infliggendo danni. Gli avversari travolti possono tentare un attacco di
    opportunit&agrave; o tentare un Tiro salvezza su IST per subire la
    met&agrave; dei danni. Una creatura con Travolgere pu&ograve; infliggere
    danni da travolgimento ad un bersaglio una volta per turno, non importa
    quante volte il suo movimento passa sopra alla creatura bersaglio</p>

