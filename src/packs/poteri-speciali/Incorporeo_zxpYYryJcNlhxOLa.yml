  description: >-
    <p>Alcune creature (spettri, fantasmi...) sono inconsistenti, possono essere
    danneggiati solo da altri esseri incorporei, da armi magiche, elementali o
    da magie, effetti simili a poteri o effetti soprannaturali, possono comunque
    manipolare oggetti o esercitare una forza fisica su oggetti. Se colpita da
    un potere, armi magiche o elementali, una creatura incorporea lancia 1d10
    con 6+ ignorare qualsiasi danno da una fonte corporea, tranne per la sfera
    di forza. Gli attacchi fisici di creature incorporee ignorano
    l&rsquo;armatura materiale, anche se magica, a meno che non sia fatta di
    forza. Quindi non viene applicata la sua riduzione del danno ovviamente se
    non stanno usando<br>armi. Le creature incorporee non lasciano orme, non
    hanno profumo, e non fanno rumore a meno che non si manifestino, e anche
    allora fanno rumore solo intenzionalmente</p>
