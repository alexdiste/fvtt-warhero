    @UUID[Compendium.fvtt-warhero.evocazioni.Actor.7thHGRgPzJMN8Dmr]{Drago verde
    (evocato)}: FIS:5 IST:1 MEN:2 , 2 artigli 2d6, morso 1d10<br>Il drago
