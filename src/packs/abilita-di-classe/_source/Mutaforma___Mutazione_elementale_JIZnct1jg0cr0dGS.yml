  description: >-
    <p>Mutazione elementale: Il personaggio pu&ograve; trasformarsi in un
    elementale mantenendo le proprie caratteristiche. Il danno inflitto &egrave;
    di base 2d6. L'equipaggiamento si fonde con l'alone dell'elemento.</p>

    <ul>

    <li><span style="font-family: var(--font-primary); font-size:
    var(--font-size-14);">Aria : vola come movimento, il danno &egrave; di tipo
    scossa, +1d6 al danno</span></li>

    <li>Acqua: nessun prova di nuotare, il danno &egrave; di tipo gelo,+1d8 al
    danno</li>

    <li>Fuoco: se colpito infligge automaticamente 1d6 danni da fuoco, il danno
    inflitto &egrave; di tipo&nbsp; fuoco,+1d8 al danno</li>

    <li>Terra: aumenta di 2 la propria difesa, il danno inflitto &egrave; di
    tipo acido, +2d6 al danno</li>

    </ul>

    <p><br>Ogni elementale pu&ograve; effettuare sempre 3 colpi con ogni mossa
    di attacco, se si decide di farne pi&ugrave; di uno si ottiene lo stesso
    malus dell'utilizzo di due armi. Pu&ograve; continuare a parlare tutte le
    lingue che conosce</p>
