  description: >-
    <p>Il personaggio pu&ograve; tentare di controllare un golem, la prova ha
    successo automatico se il<br>creatore lo permette, altrimenti il runologo
    deve riuscire a rimanere adiacente per 6 mosse consecutive al golem che
    vuole controllare, questo gli permette di incidere sopra una runa che ne
    permette il controllo completo. Non &egrave; possibile avere pi&ugrave; di
    un golem sotto controllo contemporaneamente</p>
