  description: >-
    <p>Il personaggio pu&ograve; una volta al giorno aggiungere a un oggetto che
    potrebbe creare, 1 carica di un&nbsp;potere qualsiasi a sua scelta. Questo
    procedimento richiede&nbsp;almeno un ora di lavorazione e a seconda del
    livello del potere&nbsp;la probabilit&agrave; di successo nella creazione
    dell'oggetto &egrave; la&nbsp;seguente:<br>● I livello: 80%<br>● II livello:
    50%<br>● III livello: 30%<br>● IV livello: 10%<br>Non &egrave; possibile
    mettere pi&ugrave; di una carica in questo modo sullo&nbsp;stesso oggetto.
    In alternativa pu&ograve; creare un'arma magica in<br>modo permanente
    fornendogli un bonus +1, +2 o +3 al TxC o&nbsp;al Danno come se fossero
    livelli di potere per stabilire la&nbsp;difficolt&agrave; e il tempo, in
    caso di successo &egrave; necessario&nbsp;consumare met&agrave; del prezzo
    da manuale per avere quel tipo di<br>oggetto</p>
