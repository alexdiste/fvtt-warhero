  description: >-
    <p>Il personaggio pu&ograve; cambiare forma a suo<br>piacimento come azione,
    e pu&ograve; assumere una delle seguenti<br>forme:</p>

    <ul>

    <li>Lupo : +1 FIS, +2 IST morso 2d4, artiglio 1d8.</li>

    <li>Foca : nessuna prova di nuotare, scurovisione, coda 1d8.</li>

    <li>Aquila: volare, assaltare, becco 2d4.</li>

    <li>Orso : +2 FIS,+1 IST, artiglio 2d6, morso 1d10.</li>

    </ul>

    <p><br>la trasformazione fa acquistare al mutaforma i bonus alle statistiche
    e gli attacchi della nuova forma ma non gli consente di lanciare poteri.
    Usare entrambi i tipi di attacchi provoca gli stessi malus di usare due
    armi. L'equipaggiamento si fonde con il manto dell'animale. Pu&ograve;
    continuare a parlare tutte le lingue che conosce</p>
