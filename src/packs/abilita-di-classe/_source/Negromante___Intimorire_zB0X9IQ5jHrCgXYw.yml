  description: >-
    <p>Il personaggio pu&ograve; tentare 3 + MEN volte al giorno,
    di&nbsp;intimorire un non morto. Se supera un TxC sul bersaglio (pu&ograve;
    usare&nbsp;MEN al posto IST nel tiro). Un non morto intimorito si dissolve
    e&nbsp;sparisce. Se supera di 5 o pi&ugrave; punti il valore di difesa del
    non morto&nbsp;esso viene invece controllato completamente dal personaggio
    fino&nbsp;alla sua distruzione. Non &egrave; possibile controllare un numero
    di non&nbsp;morti superiore al proprio valore di MEN (le evocazioni
    non<br>rientrano in questo conteggio). Usare intimorire &egrave; considerata
    una&nbsp;mossa movimento</p>
