  description: >-
    <p>Il personaggio pu&ograve; prendere potere da un&nbsp;bersaglio abbattuto
    entro 10 metri da lui e ottiene un bonus di +5PF&nbsp;massimali o +1 Difesa
    o +1 Parata o +1 a INI, questa abilit&agrave; si pu&ograve;&nbsp;sommare
    fino a un massimo di 10 volte al giorno e non si pu&ograve;&nbsp;prendere
    pi&ugrave; di 5 volte lo stesso bonus. E' possibile scegliere&nbsp;questa
    abilit&agrave; con l&rsquo;abilit&agrave; aggiuntiva &ldquo;Capacit&agrave;
    extra&rdquo;, essa in&nbsp;questo caso aumenta il massimale di volte al
    giorno che si pu&ograve;&nbsp;accumulare questa abilit&agrave; di 2, e si
    aumenta di 1 il&nbsp; imasuglio del potere, differentemente da come scritto
    nel abilit&agrave; aggiuntiva</p>
