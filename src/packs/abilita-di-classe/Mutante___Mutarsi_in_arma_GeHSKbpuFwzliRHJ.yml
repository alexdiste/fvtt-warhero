  description: >-
    <p>Il personaggio può 1+IST volte al giorno mutarsi in un' arma a sua
    scelta, l'arma ha un bonus al TxC pari all'IST del personaggio e un bonus al
    danno pari al FIS. Ogni volta che chi la impugna fa un TxC, anche il
    personaggio effettua un TxC e si prende il dado migliore come risultato del
    tiro. Il personaggio rimane in grado di parlare e può usare una singola
    mossa potere nel suo turno. Rimuovere la mutazione non è una mossa, all'alba
    di ogni giorno la mutazione termina</p>
