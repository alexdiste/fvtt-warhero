  description: >-
    <p>Il personaggio pu&ograve; spendere un'azione per&nbsp;tramutarsi nel
    drago del proprio tipo, questo gli fornisce un bonus di&nbsp;+2 a alle
    statistiche FIS e IST, ottiene inoltre l'attacco con il morso&nbsp;1d10, due
    artigliate da 2d6, e la codata 2d4. La trasformazione non&nbsp;gli consente
    di lanciare poteri ma pu&ograve; volare al suo movimento.&nbsp;Usare
    pi&ugrave; di un tipo di attacco per turno provoca gli stessi malus
    di&nbsp;usare due armi. L'equipaggiamento si fonde con il manto del
    drago&nbsp;fino a che mantiene la forma</p>
