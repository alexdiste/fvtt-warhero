    tutt'uno con il famiglio prescelto. Il famiglio acquisisce
    le&nbsp;statistiche dell'allevatore compreso difesa e punti ferita e
    pu&ograve;&nbsp;parlare, inoltre ottiene un attacco da corpo a corpo da 3d12
    danni e&nbsp;aumenta di taglia . Mentre &egrave; in questo stato non
    pu&ograve; far uso dei&nbsp;poteri, ma ottiene tutti i vantaggi
    dell&rsquo;animale, come nuotare, volare,&nbsp;scavare ecc.. Se il
    personaggio muore in questo stato, tutti i famigli&nbsp;muoiono con lui</p>
