  description: >-
    <p>Il personaggio pu&ograve; 3+MEN volte al giorno&nbsp;prendere un alleato
    consenziente e scagliarlo a una distanza&nbsp;massima pari al suo valore di
    FIS*2 in metri. L&rsquo;alleato ottiene&nbsp;una mossa di attacco bonus con
    armi a distanza mentre viene&nbsp;lanciato o con armi da corpo a corpo se
    atterra in un quadretto&nbsp;adiacente a un bersaglio. Se viene scagliato in
    un quadretto&nbsp;dove c&rsquo;&egrave; un bersaglio esso subisce 6d6 danni
    CD 18 IST per&nbsp;negare e colui che viene scagliato subisce 3d6 danni
    non<br>riducibili da armature entrambi devono fare un tiro salvezza
    su&nbsp;FIS CD 15 o si viene buttati a terra</p>
