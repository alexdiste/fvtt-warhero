  description: >-
    <p>Se il tuo Txc ha avuto successo, puoi scegliere di non infliggere danni
    all'avversario e tentare di spingerlo a terra. Entrambi i personaggi devono
    lanciare 1d20, a cui si aggiungono i rispettivi valori di FIS ed eventuali
    bonus. Se il punteggio ottenuto dall'attaccante supera quello del difensore,
    quest'ultimo cade rovinosamente a terra. Il personaggio atterrato &egrave;
    alla merc&egrave; dei suoi avversari: per rialzarsi, deve compiere un'azione
    di movimento ed esporsi ad un eventuale attacco di opportunit&agrave; di
    tutti i personaggi adiacenti, ma questo attacco non pu&ograve; essere usato
    per disarmare o spingere a terra nuovamente. E' possibile tuttavia
    Combattere da terra</p>
