  description: >-
    <p>Se il tuo Txc ha avuto successo, puoi scegliere di non infliggere danni
    all'avversario e tentare invece di immobilizzarlo. Entrambi i personaggi
    devono lanciare 1d20, a cui si aggiungono i rispettivi valori di FIS ed
    eventuali bonus. Il personaggio in difesa pu&ograve; utilizzare IST al posto
    di FIS, qualora pi&ugrave; vantaggioso. Se il punteggio ottenuto
    dall'attaccante supera quello del difensore, quest'ultimo viene
    immobilizzato. Il personaggio immobilizzato pu&ograve; tentare di
    divincolarsi e di sfuggire alla presa del suo avversario compiendo un'azione
    di movimento: in tal caso, il lancio di immobilizzazione deve essere
    ripetuto. Ovviamente, non &egrave; possibile attaccare con le armi quando si
    &egrave; immobilizzati.</p>

    <p>Dare al pg immobilizzato l'effetto Immobilizzato</p>
