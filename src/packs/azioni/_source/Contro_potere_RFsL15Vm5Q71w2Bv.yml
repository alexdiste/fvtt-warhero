  description: >-
    <p>Ci si pu&ograve; riferire al contro potere come azione o abilit&agrave;
    aggiuntiva.</p>

    <p>Questo trafiletto serve a descrivere l'azione di contropotere.</p>

    <p>Entrambi i personaggi devono lanciare 1d20, a cui si aggiungono i
    rispettivi valori di MEN ed eventuali bonus. Se il punteggio ottenuto dal
    giocatore che ha lanciato il contropotere &egrave; pi&ugrave; alto, il
    potere viene neutralizzato. Il giocatore che ha lanciato il contropotere,
    inoltre, non potr&agrave; utilizzare mosse potere nel suo prossimo round</p>

