  description: >-
    <p>Qualora si impugnino armi contundenti (mazze, martelli, ecc.) o si
    Combatta senza armi , si possono infliggere danni stordenti al posto di
    quelli normali. Il malcapitato subir&agrave; dei danni normalmente ma, se il
    suo valore di punti ferita dovesse scendere sotto 0, cadr&agrave; a terra
    stordito. Per potersi rialzare, dovr&agrave; essere curato oppure attendere
    un po' di tempo, dato che il ritmo naturale di guarigione &egrave; di 1
    punto ferita al minuto per questo tipo di ferite. Chiaramente, se fossimo
    circondati da mostri o nemici, tale attesa potrebbe rivelarsi fatale!</p>

