  description: >-
    <p>Se i PF del tuo personaggio scendono sotto lo 0 (senza subire colpi
    stordenti), sei in guai seri. Per evitare la dipartita, ad ogni turno dovrai
    lanciare 1d20, a cui potrai sommare soltanto il tuo valore di FIS e
    nient'altro. Per cavartela e non passare a miglior vita, dovrai ottenere ad
    ogni round un punteggio pari o superiore a 13; solo dopo essere guarito il
    tuo personaggio smetter&agrave; di sanguinare e le sue 20 condizioni vitali
    si a stabilizzarsi. Nel caso in cui il risultato di un lancio sia inferiore
    a 13 per il nostro personaggio non ci sar&agrave; pi&ugrave; nulla da fare.
    E' importante precisare che, quando i nostri PF sono inferiori a zero, non
    subiamo alcun danno dai colpi avversari. Tuttavia, ulteriori 30 danni in
    questo stato provocano immediatamente la morte del personaggio.</p>

    <p>Se un pg fallisec un tiro di Sfidare la morte o subisce altri 30 danni
    allora mettere su di lui lo stato Morto</p>
