  description: >-
    <p>Se il tuo Txc ha avuto successo, puoi scegliere di non infliggere alcun
    danno all'avversario e tentare piuttosto di disarmarlo. In tal caso,
    entrambi i personaggi devono lanciare 1d20, a cui si aggiungono i rispettivi
    valori di IST ed eventuali bonus. Se il punteggio ottenuto dall'attaccante
    supera quello del difensore, quest'ultimo perde una delle armi che
    impugnava. Per ogni 5 punti di differenza tra il tiro dell'attaccante e
    quello del difensore, l'arma cade a 2 ulteriori metri di distanza</p>
