  description: >-
    <p>Qualora il nostro personaggio impugni uno scudo o brandisca due armi,
    pu&ograve; parare i colpi inflitti dagli avversari. Per parare, devi
    lanciare 1d12 [[/r 1d12 #Parata. Ricordo si pu&oacute; parare solo un
    attacco per turno. Se ottieni 1 &eacute; sempre fallimento automatico, se
    ottieni 12 sempre successo automatico, altrimenti pari se con questo tiro
    fai 12 o pi&uacute;]] la CD per riuscire in una parata &egrave; 12. Puoi
    parare gli attacchi avversari solo una volta per turno.</p>

    <p>&nbsp;</p>

    <p>Gli scudi danno un bonus di parata in base alla tipologia. Scudi leggeri
    danno +1 [[/r 1d12+1 #Parare con scudo leggero. Ricordo si pu&oacute; parare
    solo un attacco per turno. Se ottieni 1 &eacute; sempre fallimento
    automatico, se ottieni 12 sempre successo automatico, altrimenti pari se con
    questo tiro fai 12 o pi&uacute;]], scudi pesanti +3 [[/r 1d12+3 #Parare con
    scudo pesante. Ricordo si pu&oacute; parare solo un attacco per turno. Se
    ottieni 1 &eacute; sempre fallimento automatico, se ottieni 12 sempre
    successo automatico, altrimenti pari se con questo tiro fai 12 o
    pi&uacute;]] e scudi torre +5 [[/r 1d12+5 #Parare con scudo torre. Ricordo
    si pu&oacute; parare solo un attacco per turno. Se ottieni 1 &eacute; sempre
    fallimento automatico, se ottieni 12 sempre successo automatico, altrimenti
    pari se con questo tiro fai 12 o pi&uacute;]]</p>

    <p>Invece brandire le due armi permette di parare ma con 0 bonus, tiri solo
    il 12 puro e pari se fai 12. [[/r 1d12 #Parare con due armi. Ricordo si
    pu&oacute; parare solo un attacco per turno. Se ottieni 1 &eacute; sempre
    fallimento automatico, se ottieni 12 sempre successo automatico, altrimenti
    pari se con questo tiro fai 12 o pi&uacute;]]</p>
