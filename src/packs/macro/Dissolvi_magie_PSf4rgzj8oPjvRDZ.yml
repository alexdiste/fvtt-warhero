name: Dissolvi magie
type: script
command: |-
  // Verifica se c'è un token selezionato
  const token = canvas.tokens.controlled[0];

  if (!token) {
    ui.notifications.warn("Per favore, seleziona un token prima di eseguire la macro!");
  } else {
    const actor = token.actor;
    // Recupero mana attuale usando il percorso corretto: attributes.mana.value
    const currentMana = actor.system.attributes?.mana?.value ?? 0;

    let optionsContent = `
      <div class="form-group">
        <label>Tipo di Dissoluzione:</label>
        <select id="spell-type" style="width: 100%">
          <option value="normal">Normale (+0, Costo: 2)</option>
          <option value="superior">Superiore (+5, Costo: 4)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Modalità di tiro:</label>
        <select id="roll-mode" style="width: 100%">
          <option value="normal">Normale</option>
          <option value="advantage">Vantaggio</option>
          <option value="disadvantage">Svantaggio</option>
        </select>
      </div>
      <div class="form-group">
        <label>Bonus Situazionale:</label>
        <input type="number" id="bonus-add" value="0">
      </div>
      <hr>
      <div class="form-group">
        <label>Consuma Mana?</label>
        <input type="checkbox" id="use-mana" checked>
      </div>
      <div class="form-group">
        <label>Quantità Mana (Attuale: ${currentMana}):</label>
        <input type="number" id="mana-cost" value="2">
      </div>
      <script>
        // Aggiornamento dinamico del costo di default
        document.getElementById('spell-type').addEventListener('change', function() {
          const manaInput = document.getElementById('mana-cost');
          manaInput.value = (this.value === 'superior') ? 4 : 2;
        });
      </script>
    `;

    new Dialog({
      title: `Dissolvi Magie: ${actor.name}`,
      content: optionsContent,
      buttons: {
        roll: {
          icon: '<i class="fas fa-magic"></i>',
          label: "Tenta Dissoluzione",
          callback: async (html) => {
            const type = html.find('#spell-type').val();
            const mode = html.find('#roll-mode').val();
            const bonusAdd = parseInt(html.find('#bonus-add').val()) || 0;
            const useMana = html.find('#use-mana').is(':checked');
            const manaCost = parseInt(html.find('#mana-cost').val()) || 0;
            
            // Logica Sottrazione Mana
            if (useMana) {
              if (currentMana < manaCost) {
                return ui.notifications.error(`Mana insufficiente! (Richiesto: ${manaCost}, Attuale: ${currentMana})`);
              }
              // Aggiornamento sul percorso corretto
              await actor.update({ "system.attributes.mana.value": currentMana - manaCost });
            }

            let die = "1d20";
            let labelMode = "";
            let typeBonus = (type === "superior") ? 5 : 0;
            let typeLabel = (type === "superior") ? "Superiore" : "Normale";
            
            if (mode === "advantage") {
              die = "2d20kh1";
              labelMode = " (Vantaggio)";
            } else if (mode === "disadvantage") {
              die = "2d20kl1";
              labelMode = " (Svantaggio)";
            }

            // Recupero bonus Mente (MIN)
            let minBonus = 0;
            try {
                minBonus = actor.system.statistics.min.value || 0;
            } catch (e) {
                ui.notifications.error("Errore: Impossibile trovare il valore Mente (MIN).");
                return;
            }

            // Calcolo e Tiro
            let formula = `${die} + ${minBonus} + ${typeBonus} + ${bonusAdd}`;
            let roll = await new Roll(formula).evaluate();
            
            // Determinazione successo per soglie
            const total = roll.total;
            let spellResult = "";

            if (total >= 18) {
              spellResult = "DISSOLTO: Incantesimo di 4° livello (o inferiore)";
            } else if (total >= 16) {
              spellResult = "DISSOLTO: Incantesimo di 3° livello (o inferiore)";
            } else if (total >= 14) {
              spellResult = "DISSOLTO: Incantesimo di 2° livello (o inferiore)";
            } else if (total >= 10) {
              spellResult = "DISSOLTO: Incantesimo di 1° livello";
            } else {
              spellResult = "FALLIMENTO: L'incantesimo persiste.";
            }

            let color = total >= 10 ? "#18520b" : "#8a0606";
            let manaText = useMana ? `<br><small>Mana residuo: ${currentMana - manaCost}</small>` : "";

            await roll.toMessage({
              speaker: ChatMessage.getSpeaker({ token: token.document }),
              flavor: `
                <div style="text-align: center;">
                  <strong>Dissolvi Magie ${typeLabel}${labelMode}</strong>
                  ${manaText}
                </div>
                <hr>
                <div style="color: ${color}; font-weight: bold; text-align: center;">${spellResult}</div>
              `
            });
          }
        },
        cancel: {
          icon: '<i class="fas fa-times"></i>',
          label: "Annulla"
        }
      },
      default: "roll"
    }).render(true);
  }
