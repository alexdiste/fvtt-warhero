name: Tiro per colpire in mischia con due armi
type: script
command: |-
  if (!token) {
      ChatMessage.create({ content: "Devi selezionare un token per poter fare il tiro per colpire in mischia con due armi" });
  } else {
      const txcm = token.actor.system.attributes.txcm.value;
      const malus = token.actor.system.secondary.malusmultiweapon.value;
      const formula = `1d20 + ${txcm} - ${malus}`;
      
      let r = new Roll(formula);
      await r.evaluate();
      
      const d20 = r.terms[0].total; // Prende direttamente il valore del dado
      const totale = r.total;
      let flag = false;

      // Funzione helper per generare il contenuto del messaggio
      const generaMessaggio = (nomeBersaglio = "", difesa = null) => {
          let infoCrit = "";
          let esito = "";
          let classeCss = "";

          if (d20 === 1) {
              infoCrit = " (Fallimento critico)";
              esito = nomeBersaglio ? `${nomeBersaglio} mancato` : "";
              classeCss = "crit-failure";
          } else if (d20 === 20) {
              infoCrit = " (Successo critico)";
              esito = nomeBersaglio ? `${nomeBersaglio} colpito` : "";
              classeCss = "crit-success";
          } else if (difesa !== null) {
              const colpito = totale > difesa;
              esito = `${nomeBersaglio} ${colpito ? 'colpito' : 'mancato'}`;
              classeCss = colpito ? "crit-success" : "crit-failure";
          }

          return `
              <div>
                  Tiro per colpire in mischia con due armi
                  <ul>
                      <li>Formula: ${formula}</li>
                      <li><span class="${d20 === 1 || d20 === 20 ? classeCss : ''}">Risultato del dado: ${d20}</span></li>
                      <li><strong>Risultato: ${totale}</strong>${infoCrit}</li>
                  </ul>
                  ${esito ? `<br><span class="${classeCss}">${esito}</span>` : ""}
              </div>`;
      };

      // Ciclo sui bersagli
      for (let target of game.user.targets) {
          flag = true;
          const difesa = target.actor.system.attributes.def.value;
          ChatMessage.create({
              user: game.user.id,
              content: generaMessaggio(target.name, difesa)
          });
      }

      // Se non ci sono bersagli, fa un lancio generico
      if (!flag) {
          ChatMessage.create({
              user: game.user.id,
              content: generaMessaggio()
          });
      }
  }
