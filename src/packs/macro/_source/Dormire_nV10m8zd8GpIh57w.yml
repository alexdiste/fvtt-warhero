name: Dormire
type: script
command: "if (!token){\n\n\tChatMessage.create({\n\tuser : game.user._id,\n\tcontent:\"Devi selezionare un token per poter dormire\"\n\t});\n\t\n}else{\n\tconst manamax= token.actor.system.attributes.mana.max;\n\tconst hpmax= token.actor.system.attributes.hp.max;\n\tlet nskill = 0;\n\n\tactor.items.forEach(it => { if (it.type == 'skill') {\n\t\tif(!it.system.unlimited){\n\t\t\t//update item currentuse bring to 0\n\t\t\tactor.items.get(it.id).update({\"system.currentuse\": 0});\n\t\t}\n\t}\n\t})\n\n\tawait token.actor.update({\"system.attributes.mana.value\": manamax });\n\tawait token.actor.update({\"system.attributes.hp.value\": hpmax });\n\tawait token.actor.update({\"system.secondary.counterspell.nbuse\": 0}); //resetta usi di contropotere\n\n\tChatMessage.create({\n\tuser : game.user._id,\n\tcontent:token.actor.name+\" ha dormito recuperando tutti i PF, tutto il mana, tutti gli usi di contropotere e tutti gli usi delle abilità. Ricordati di controllare se hai già mangiato questo giorno o no, in caso negativo ricordati di scalare una razione\"\n\t});\n}"
