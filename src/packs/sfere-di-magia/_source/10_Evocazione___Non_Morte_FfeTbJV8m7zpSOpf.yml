    attacco si ottiene lo stessomalus come nell&rsquo;uso delle due armi. Le
    evocazioni hanno punti ferita pari a 10 +(10*FIS) e una difesa pari a 12
    +IST, il tempo di lancio di questi poteri &egrave; di 4 mosse consecutive. E
    necessario usareuna mossa per poter far eseguire 2 mosse
    all&rsquo;evocazione</em></p>
